<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ona Energy Dashboard 2026</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
body{font-family:system-ui;margin:0;background:#f4f6f9;}
.header{background:#0f172a;color:white;padding:1rem 2rem;font-weight:600;}
.section{padding:2rem;}
.card{background:white;border-radius:12px;padding:1.5rem;max-width:900px;margin:auto;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
button{padding:10px 16px;border:none;border-radius:8px;background:#0ea5e9;color:white;font-weight:600;cursor:pointer;}
select{padding:10px 14px;border-radius:8px;border:1px solid #cbd5e1;min-width:280px;}
#chart{height:520px;}
.kpis{display:flex;gap:15px;margin:15px 0;}
.kpi{flex:1;background:white;padding:15px;border-radius:10px}
.kpi.bad{background:#fee2e2}
.controls{margin:10px 0}
.controls label{margin-right:10px}
</style>
</head>

<body>

<div class="header">Ona Energy Dashboard 2026</div>

<div id="inicio" class="section">
<div class="card">
<h2>Selecciona complejo</h2>
<div style="display:flex;gap:10px;">
<select id="selector"></select>
<button onclick="verDashboard()">VER DATOS</button>
</div>
</div>
</div>

<div id="dashboard" class="section" style="display:none;">
<button onclick="volver()">← Volver</button>
<h2 id="titulo"></h2>

<div id="kpis" class="kpis"></div>

<div class="controls">
<label><input type="checkbox" id="rn" checked> RN</label>
<label><input type="checkbox" id="pax" checked> PAX</label>
<label><input type="checkbox" id="cer" checked> kWh/RN</label>
<label><input type="checkbox" id="cep" checked> kWh/PAX</label>
<label><input type="checkbox" id="hdd" checked> HDD</label>
<label><input type="checkbox" id="cdd" checked> CDD</label>
</div>

<div id="chart"></div>
</div>

<script>

const meses=["ENE","FEB","MAR","ABR","MAY"];

const CLIMA={
LEMG:{hdd:[106.3,73.2,68.2,22.6,4],cdd:[1.2,4.8,3.3,25.2,76.9]},
LEPA:{hdd:[120.9,60.1,89.5,58.6,10.4],cdd:[0,3.7,0.2,36.1,78.8]},
LEBL:{hdd:[161.8,81.5,75.7,23.3,4.4],cdd:[0,1.8,0.1,13.2,66.6]},
GCTS:{hdd:[1.1,0.2,0.3,0,0],cdd:[25.2,49.2,29.9,61.7,81.8]},
GCXO:{hdd:[65.6,39.8,70.6,37,18.4],cdd:[0,12.6,0,10,18.5]}
};

const ESTACION={
"Be Live OROTAVA":"GCXO",
"BEVERLY HILLS HEIGHTS (EXCEL)":"GCTS",
"BEVERLY HILLS SUITES (EXCEL)":"GCTS",
"HOLLYWOOD MIRAGE (EXCEL)":"GCTS",
"PALM BEACH (EXCEL)":"GCTS",
"ONA MOSAIC":"LEBL",
"ONA VILLAGE CALA D'OR":"LEPA",
"ONA CAMPANARIO":"LEMG",
"ONA DIANA PARK":"LEMG",
"ONA LAS RAMPAS":"LEMG",
"ONA LIVING BARCELONA":"LEBL",
"ONA MARBELLA INN":"LEMG",
"ONA MARINAS DE NERJA":"LEMG",
"ONA PALAMÓS":"LEBL",
"ONA PALMIRA PAGUERA":"LEPA",
"ONA PALMIRA PARADISE":"LEPA",
"ONA VALLE ROMANO":"LEMG",
"Hotel Ritual":"LEMG"
};

const DATA = {
"Be Live OROTAVA":{cons:[70968,71201,75038,73788,82784],rn:[5182,5421,5131,3641,5113],pax:[9609,9808,9531,7181,9777]},
"BEVERLY HILLS HEIGHTS (EXCEL)":{cons:[70784,63456,62626,50464,56724],rn:[3306,3068,3305,2784,2924],pax:[8702,8249,8174,7384,7262]},
"BEVERLY HILLS SUITES (EXCEL)":{cons:[89868,84354,86462,82495,79295],rn:[4100,3796,4079,3103,2651],pax:[9100,8690,8822,7247,5546]},
"HOLLYWOOD MIRAGE (EXCEL)":{cons:[198930,183746,204842,199749,209902],rn:[9722,8917,9432,8449,8336],pax:[24020,22489,22666,20167,18223]},
"PALM BEACH (EXCEL)":{cons:[151323,147660,154501,154456,156819],rn:[9241,8528,9288,8285,7471],pax:[24246,23854,25776,22502,17708]},
"ONA MOSAIC":{cons:[18717,12797,13981,16944,19458],rn:[1531,1400,1426,1497,1599],pax:[2632,2432,2554,3028,2888]},
"ONA VILLAGE CALA D'OR":{cons:[2595,5669,18219,22121,22270],rn:[0,0,428,1170,1246],pax:[0,0,1137,3622,3636]},
"ONA CAMPANARIO":{cons:[78822,63147,59933,41674,34003],rn:[980,1032,1169,1124,1235],pax:[1755,2032,2170,2621,2033]},
"ONA DIANA PARK":{cons:[4335,4892,28156,31958,34306],rn:[0,0,1568,2318,2578],pax:[0,0,2084,3476,4208]},
"ONA LAS RAMPAS":{cons:[3058,4788,26463,32421,42346],rn:[0,0,1675,3149,3492],pax:[0,0,2622,4049,5071]},
"ONA LIVING BARCELONA":{cons:[7994,5380,5408,3593,5115],rn:[534,545,504,571,592],pax:[1175,1164,1103,1760,1343]},
"ONA MARBELLA INN":{cons:[9257,13131,19152,17496,17358],rn:[436,948,1645,1644,1706],pax:[764,1633,2830,3157,3079]},
"ONA MARINAS DE NERJA":{cons:[91529,82501,90101,87829,105210],rn:[4544,5309,6211,6278,6316],pax:[9510,10984,11994,15917,15526]},
"ONA PALAMÓS":{cons:[2304,2306,17117,20017,33327],rn:[0,0,1025,1874,2216],pax:[0,0,2059,3379,4668]},
"ONA PALMIRA PAGUERA":{cons:[2399,2228,24017,59368,66399],rn:[0,0,1291,6068,7191],pax:[0,0,2535,12086,13592]},
"ONA PALMIRA PARADISE":{cons:[8230,8745,7679,59086,66399],rn:[0,0,1291,6068,7191],pax:[0,0,2535,12086,13592]},
"ONA VALLE ROMANO":{cons:[243943,223965,247885,255286,240225],rn:[6155,7327,8831,9577,10927],pax:[12579,14852,19034,22196,23631]},
"Hotel Ritual":{cons:[16972,11886,52068,59255,78681],rn:[455,28,3236,3785,4549],pax:[697,2542,4996,5952,7007]}
};

// selector
const selector=document.getElementById("selector");
Object.keys(DATA).forEach(c=>{
let op=document.createElement("option");
op.value=c;
op.textContent=c;
selector.appendChild(op);
});

function verDashboard(){
document.getElementById("inicio").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("titulo").innerText=selector.value;
pintar(selector.value);
}

function volver(){
document.getElementById("inicio").style.display="block";
document.getElementById("dashboard").style.display="none";
}

function pintar(c){

let d=DATA[c];
let clima=CLIMA[ESTACION[c]];

let ce_rn=d.cons.map((v,i)=>d.rn[i]?v/d.rn[i]:null);
let ce_pax=d.cons.map((v,i)=>d.pax[i]?v/d.pax[i]:null);

let t=[];

// consumo
t.push({x:meses,y:d.cons,type:'bar',name:'Consumo',marker:{color:'#3b5a73'},yaxis:'y1'});

// RN
if(rn.checked)t.push({x:meses,y:d.rn,type:'scatter',name:'RN',line:{color:'#6b21a8'},yaxis:'y2'});

// PAX
if(pax.checked)t.push({x:meses,y:d.pax,type:'scatter',name:'PAX',line:{color:'#16a34a'},yaxis:'y2'});

// ratios
if(cer.checked)t.push({x:meses,y:ce_rn,type:'scatter',name:'kWh/RN',line:{color:'#d946ef'},yaxis:'y3'});
if(cep.checked)t.push({x:meses,y:ce_pax,type:'scatter',name:'kWh/PAX',line:{color:'#86efac'},yaxis:'y3'});

// clima
if(hdd.checked)t.push({x:meses,y:clima.hdd,type:'scatter',name:'HDD',line:{color:'#dc2626',dash:'dash'},yaxis:'y3'});
if(cdd.checked)t.push({x:meses,y:clima.cdd,type:'scatter',name:'CDD',line:{color:'#1e3a8a',dash:'dash'},yaxis:'y3'});

Plotly.newPlot("chart",t,{
yaxis:{title:'Consumo (kWh)'},
yaxis2:{overlaying:'y',side:'right'},
yaxis3:{overlaying:'y',side:'right',position:0.96},
hovermode:'x unified'
});
}

</script>

</body>
</html>
